<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カラーピッカー - public-tools</title>
<link rel="stylesheet" href="../_shared/style.css">
<style>
  /* tool-local: ピッカーレイアウト */
  .picker-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
    align-items: start;
  }
  .preview {
    width: 100%;
    height: 200px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .swatches {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
    margin-top: 12px;
  }
  .swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
    padding: 0;
  }
  .swatch:hover { transform: scale(1.06); }
  .field {
    display: grid;
    grid-template-columns: 70px 1fr 110px;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .field label { color: var(--muted); font-size: 0.9rem; }
  .field input[type="range"] { width: 100%; }
  .field .num {
    width: 100%;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .copy-row {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    gap: 8px;
    margin-bottom: 6px;
    align-items: center;
  }
  .copy-row .fmt { color: var(--muted); font-size: 0.85rem; }
  .copy-row code {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.95rem;
  }
</style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="../../index.html">← ツール一覧へ戻る</a></div>
  <header class="page-header">
    <h1>カラーピッカー</h1>
    <p class="lead">HEX / RGB / HSL を相互変換しながら色を選択し、ワンクリックでコピー。</p>
  </header>

  <div class="picker-layout">
    <div>
      <div class="preview" id="preview"></div>
      <div style="margin-top:12px;">
        <input type="color" id="native" value="#2563eb" style="width:100%;height:48px;padding:4px;">
      </div>
      <div class="swatches" id="swatches"></div>
    </div>

    <div>
      <h2>RGB</h2>
      <div class="field">
        <label for="r">R</label>
        <input type="range" id="r" min="0" max="255" step="1">
        <input type="number" id="rn" class="num" min="0" max="255">
      </div>
      <div class="field">
        <label for="g">G</label>
        <input type="range" id="g" min="0" max="255" step="1">
        <input type="number" id="gn" class="num" min="0" max="255">
      </div>
      <div class="field">
        <label for="b">B</label>
        <input type="range" id="b" min="0" max="255" step="1">
        <input type="number" id="bn" class="num" min="0" max="255">
      </div>

      <h2>HSL</h2>
      <div class="field">
        <label for="h">H</label>
        <input type="range" id="h" min="0" max="360" step="1">
        <input type="number" id="hn" class="num" min="0" max="360">
      </div>
      <div class="field">
        <label for="s">S</label>
        <input type="range" id="s" min="0" max="100" step="1">
        <input type="number" id="sn" class="num" min="0" max="100">
      </div>
      <div class="field">
        <label for="l">L</label>
        <input type="range" id="l" min="0" max="100" step="1">
        <input type="number" id="ln" class="num" min="0" max="100">
      </div>

      <h2>コピー</h2>
      <div class="copy-row">
        <span class="fmt">HEX</span>
        <code id="cHex">#2563eb</code>
        <button type="button" data-copy="cHex">コピー</button>
      </div>
      <div class="copy-row">
        <span class="fmt">RGB</span>
        <code id="cRgb">rgb(37, 99, 235)</code>
        <button type="button" data-copy="cRgb">コピー</button>
      </div>
      <div class="copy-row">
        <span class="fmt">HSL</span>
        <code id="cHsl">hsl(220, 83%, 53%)</code>
        <button type="button" data-copy="cHsl">コピー</button>
      </div>
    </div>
  </div>
</div>

<script>
  (function () {
    // ---- 色変換ユーティリティ ----
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function toHex2(n) { return n.toString(16).padStart(2, '0'); }

    function rgbToHex(r, g, b) {
      return '#' + toHex2(r) + toHex2(g) + toHex2(b);
    }
    function hexToRgb(hex) {
      hex = hex.replace('#', '').trim();
      if (hex.length === 3) hex = hex.split('').map((c) => c + c).join('');
      if (!/^[0-9a-fA-F]{6}$/.test(hex)) return null;
      return {
        r: parseInt(hex.slice(0, 2), 16),
        g: parseInt(hex.slice(2, 4), 16),
        b: parseInt(hex.slice(4, 6), 16),
      };
    }
    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h = 0, s = 0;
      const l = (max + min) / 2;
      if (max !== min) {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h *= 60;
      }
      return { h: Math.round(h), s: Math.round(s * 100), l: Math.round(l * 100) };
    }
    function hslToRgb(h, s, l) {
      h = ((h % 360) + 360) % 360;
      s /= 100; l /= 100;
      const c = (1 - Math.abs(2 * l - 1)) * s;
      const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
      const m = l - c / 2;
      let r1 = 0, g1 = 0, b1 = 0;
      if (h < 60) { r1 = c; g1 = x; b1 = 0; }
      else if (h < 120) { r1 = x; g1 = c; b1 = 0; }
      else if (h < 180) { r1 = 0; g1 = c; b1 = x; }
      else if (h < 240) { r1 = 0; g1 = x; b1 = c; }
      else if (h < 300) { r1 = x; g1 = 0; b1 = c; }
      else { r1 = c; g1 = 0; b1 = x; }
      return {
        r: Math.round((r1 + m) * 255),
        g: Math.round((g1 + m) * 255),
        b: Math.round((b1 + m) * 255),
      };
    }

    // ---- DOM ----
    const $ = (id) => document.getElementById(id);
    const native = $('native');
    const preview = $('preview');
    const cHex = $('cHex'), cRgb = $('cRgb'), cHsl = $('cHsl');
    const ids = ['r', 'g', 'b', 'h', 's', 'l'];
    const sliders = {}; const numbers = {};
    ids.forEach((k) => { sliders[k] = $(k); numbers[k] = $(k + 'n'); });

    // ---- 状態 ----
    let state = { r: 37, g: 99, b: 235 };
    let updating = false;

    function render() {
      updating = true;
      const { r, g, b } = state;
      const hsl = rgbToHsl(r, g, b);
      sliders.r.value = numbers.r.value = r;
      sliders.g.value = numbers.g.value = g;
      sliders.b.value = numbers.b.value = b;
      sliders.h.value = numbers.h.value = hsl.h;
      sliders.s.value = numbers.s.value = hsl.s;
      sliders.l.value = numbers.l.value = hsl.l;
      const hex = rgbToHex(r, g, b);
      const rgbStr = 'rgb(' + r + ', ' + g + ', ' + b + ')';
      const hslStr = 'hsl(' + hsl.h + ', ' + hsl.s + '%, ' + hsl.l + '%)';
      cHex.textContent = hex;
      cRgb.textContent = rgbStr;
      cHsl.textContent = hslStr;
      preview.style.background = hex;
      native.value = hex;
      updating = false;
    }

    function setRgb(r, g, b) {
      state = {
        r: clamp(Math.round(r), 0, 255),
        g: clamp(Math.round(g), 0, 255),
        b: clamp(Math.round(b), 0, 255),
      };
      render();
    }

    function setHsl(h, s, l) {
      const rgb = hslToRgb(h, s, l);
      setRgb(rgb.r, rgb.g, rgb.b);
    }

    // ---- イベント ----
    ['r', 'g', 'b'].forEach((k) => {
      const handler = function () {
        if (updating) return;
        const v = parseInt(this.value, 10);
        if (Number.isNaN(v)) return;
        const next = { ...state };
        next[k] = clamp(v, 0, 255);
        setRgb(next.r, next.g, next.b);
      };
      sliders[k].addEventListener('input', handler);
      numbers[k].addEventListener('input', handler);
    });

    ['h', 's', 'l'].forEach((k) => {
      const handler = function () {
        if (updating) return;
        const h = parseInt(numbers.h.value, 10) || 0;
        const s = parseInt(numbers.s.value, 10) || 0;
        const l = parseInt(numbers.l.value, 10) || 0;
        // どのフィールドが触られたかで現在値を上書き
        const cur = { h: h, s: s, l: l };
        cur[k] = parseInt(this.value, 10);
        setHsl(cur.h, cur.s, cur.l);
      };
      sliders[k].addEventListener('input', handler);
      numbers[k].addEventListener('input', handler);
    });

    native.addEventListener('input', function () {
      const rgb = hexToRgb(this.value);
      if (rgb) setRgb(rgb.r, rgb.g, rgb.b);
    });

    cHex.addEventListener('click', function () {
      const next = prompt('HEX を入力 (例: #ff8800)', cHex.textContent);
      if (next == null) return;
      const rgb = hexToRgb(next);
      if (rgb) setRgb(rgb.r, rgb.g, rgb.b);
      else alert('HEX の形式が正しくありません');
    });

    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', async function () {
        const target = document.getElementById(btn.dataset.copy);
        const text = target.textContent;
        try {
          await navigator.clipboard.writeText(text);
          const orig = btn.textContent;
          btn.textContent = 'コピー済';
          setTimeout(() => { btn.textContent = orig; }, 1200);
        } catch (e) {
          alert('クリップボードにコピーできませんでした: ' + e.message);
        }
      });
    });

    // ---- スウォッチ（Tailwind 風プリセット） ----
    const SWATCHES = [
      '#000000', '#1f2937', '#6b7280', '#d1d5db', '#f3f4f6', '#ffffff', '#dc2626', '#f97316',
      '#f59e0b', '#eab308', '#84cc16', '#22c55e', '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6',
      '#6366f1', '#8b5cf6', '#a855f7', '#d946ef', '#ec4899', '#f43f5e', '#78350f', '#064e3b',
    ];
    const sw = $('swatches');
    SWATCHES.forEach((hex) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'swatch';
      b.style.background = hex;
      b.title = hex;
      b.addEventListener('click', function () {
        const rgb = hexToRgb(hex);
        if (rgb) setRgb(rgb.r, rgb.g, rgb.b);
      });
      sw.appendChild(b);
    });

    render();
  })();
</script>
</body>
</html>
