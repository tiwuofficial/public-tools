<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BMI 計算 - public-tools</title>
<link rel="stylesheet" href="../_shared/style.css">
<style>
  /* tool-local: BMI バーゲージ */
  .bmi-big {
    text-align: center;
    margin: 8px 0;
  }
  .bmi-big .num {
    font-size: 3.2rem;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .bmi-cat {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 600;
    margin-top: 4px;
  }
  .gauge {
    position: relative;
    height: 14px;
    border-radius: 7px;
    background: linear-gradient(to right,
      #60a5fa 0%,    /* 低体重 */
      #60a5fa 14.4%,
      #34d399 14.4%, /* 普通 */
      #34d399 41.6%,
      #fbbf24 41.6%, /* 肥満1 */
      #fbbf24 54.4%,
      #fb923c 54.4%, /* 肥満2 */
      #fb923c 64%,
      #f87171 64%,   /* 肥満3 */
      #f87171 80%,
      #b91c1c 80%,   /* 肥満4 */
      #b91c1c 100%);
    margin: 16px 0 6px;
    overflow: visible;
  }
  .gauge .marker {
    position: absolute;
    top: -4px;
    width: 4px;
    height: 22px;
    background: var(--fg);
    border-radius: 2px;
    transform: translateX(-2px);
    transition: left 0.2s ease;
  }
  .gauge-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="../../index.html">← ツール一覧へ戻る</a></div>
  <header class="page-header">
    <h1>BMI 計算</h1>
    <p class="lead">身長と体重から BMI（体格指数）と判定区分を計算します。標準体重・美容体重も表示。</p>
  </header>

  <div class="card">
    <div style="display:grid;grid-template-columns:140px 1fr 70px;gap:10px;align-items:center;">
      <label for="height" style="color:var(--muted);font-size:0.95rem;">身長</label>
      <input type="number" id="height" step="0.1" min="50" max="250" value="170">
      <span style="color:var(--muted);">cm</span>

      <label for="weight" style="color:var(--muted);font-size:0.95rem;">体重</label>
      <input type="number" id="weight" step="0.1" min="20" max="300" value="60">
      <span style="color:var(--muted);">kg</span>
    </div>
  </div>

  <h2>あなたの BMI</h2>
  <div class="card">
    <div class="bmi-big">
      <span class="num" id="bmi">-</span>
    </div>
    <div class="bmi-cat" id="cat" style="color:var(--muted);">-</div>

    <div class="gauge" id="gauge"><div class="marker" id="marker" style="left:0%;"></div></div>
    <div class="gauge-labels">
      <span>18.5</span><span>25</span><span>30</span><span>35</span><span>40</span>
    </div>
  </div>

  <h2>参考値</h2>
  <ul class="plain-list" id="ref"></ul>

  <p style="color:var(--muted);font-size:0.85rem;margin-top:24px;">
    判定区分は日本肥満学会の基準に基づきます（普通体重: 18.5 ≤ BMI &lt; 25）。BMI は身長と体重の比率のみを見るため、筋肉量や体脂肪率は考慮されません。健康指標としての参考値です。
  </p>
</div>

<script>
  (function () {
    const $ = (id) => document.getElementById(id);

    // 日本肥満学会 (Japan Society for the Study of Obesity)
    const CATEGORIES = [
      { max: 18.5, label: '低体重', color: '#1d4ed8' },
      { max: 25,   label: '普通体重', color: '#15803d' },
      { max: 30,   label: '肥満 (1度)', color: '#a16207' },
      { max: 35,   label: '肥満 (2度)', color: '#c2410c' },
      { max: 40,   label: '肥満 (3度)', color: '#b91c1c' },
      { max: Infinity, label: '肥満 (4度)', color: '#7f1d1d' },
    ];

    function categorize(bmi) {
      for (const c of CATEGORIES) if (bmi < c.max) return c;
      return CATEGORIES[CATEGORIES.length - 1];
    }

    function fmt(n) {
      return n.toFixed(1);
    }

    function escapeHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function row(label, val) {
      return '<li><span class="label">' + escapeHtml(label) + '</span><span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;">' + escapeHtml(val) + '</span></li>';
    }

    function update() {
      const h = parseFloat($('height').value);
      const w = parseFloat($('weight').value);
      if (!Number.isFinite(h) || !Number.isFinite(w) || h <= 0 || w <= 0) {
        $('bmi').textContent = '-';
        $('cat').textContent = '身長と体重を入力してください';
        $('cat').style.color = 'var(--muted)';
        $('marker').style.left = '0%';
        $('ref').innerHTML = '';
        return;
      }
      const m = h / 100;
      const bmi = w / (m * m);
      const cat = categorize(bmi);

      $('bmi').textContent = fmt(bmi);
      $('cat').textContent = cat.label;
      $('cat').style.color = cat.color;

      // ゲージ位置: 17 (左端) 〜 42 (右端) を 0〜100% にマップ
      const minB = 17, maxB = 42;
      const pos = Math.max(0, Math.min(100, ((bmi - minB) / (maxB - minB)) * 100));
      $('marker').style.left = pos + '%';

      const ideal22 = 22 * m * m;
      const ideal20 = 20 * m * m;
      const lower = 18.5 * m * m;
      const upper = 25 * m * m;
      const items = [
        row('標準体重 (BMI 22 = 統計的に最も病気が少ない)', fmt(ideal22) + ' kg'),
        row('美容体重 (BMI 20)', fmt(ideal20) + ' kg'),
        row('普通体重の範囲 (BMI 18.5–25)', fmt(lower) + ' kg 〜 ' + fmt(upper) + ' kg'),
        row('現在体重と標準体重の差', (w - ideal22 >= 0 ? '+' : '') + fmt(w - ideal22) + ' kg'),
      ];
      $('ref').innerHTML = items.join('');
    }

    ['height', 'weight'].forEach((id) => {
      $(id).addEventListener('input', update);
      $(id).addEventListener('change', update);
    });

    update();
  })();
</script>
</body>
</html>
