<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>割り勘計算 - public-tools</title>
<link rel="stylesheet" href="../_shared/style.css">
<style>
  /* tool-local: 割り勘の大きい結果表示 */
  .big-amount {
    font-size: 2.6rem;
    font-weight: 700;
    text-align: center;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    margin: 8px 0 4px;
  }
  .sub-amount {
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
  }
</style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="../../index.html">← ツール一覧へ戻る</a></div>
  <header class="page-header">
    <h1>割り勘計算</h1>
    <p class="lead">合計金額と人数を入れて、1 人あたりの金額を計算します。幹事の上乗せや端数の丸めにも対応。</p>
  </header>

  <div class="card">
    <div style="display:grid;grid-template-columns:140px 1fr 80px;gap:10px;align-items:center;">
      <label for="total" style="color:var(--muted);font-size:0.95rem;">合計金額</label>
      <input type="number" id="total" inputmode="numeric" min="0" placeholder="例: 18500">
      <span style="color:var(--muted);">円</span>

      <label for="people" style="color:var(--muted);font-size:0.95rem;">人数</label>
      <input type="number" id="people" inputmode="numeric" min="1" max="999" value="4">
      <span style="color:var(--muted);">人</span>

      <label for="organizer" style="color:var(--muted);font-size:0.95rem;">幹事の上乗せ</label>
      <input type="number" id="organizer" inputmode="numeric" min="0" value="0">
      <span style="color:var(--muted);">円</span>

      <label for="round" style="color:var(--muted);font-size:0.95rem;">端数処理</label>
      <select id="round" style="grid-column:span 2;">
        <option value="0">そのまま (1 円単位)</option>
        <option value="10">10 円単位</option>
        <option value="100" selected>100 円単位</option>
        <option value="500">500 円単位</option>
        <option value="1000">1000 円単位</option>
      </select>
      <span></span>

      <label for="dir" style="color:var(--muted);font-size:0.95rem;">丸め方向</label>
      <select id="dir" style="grid-column:span 2;">
        <option value="up" selected>切り上げ（多めに集める）</option>
        <option value="down">切り捨て（少なめに）</option>
        <option value="round">四捨五入</option>
      </select>
      <span></span>
    </div>
  </div>

  <h2>1 人あたり</h2>
  <div class="card">
    <div class="big-amount" id="perPerson">0 円</div>
    <div class="sub-amount" id="perOrganizer"></div>
  </div>

  <h2>内訳</h2>
  <ul class="plain-list" id="detail"></ul>

  <p style="color:var(--muted);font-size:0.85rem;margin-top:24px;">
    丸めにより集まる金額が合計と一致しない場合は「内訳」に過不足を表示します。幹事の上乗せはまず差し引かれ、残りを参加者で割ります。
  </p>
</div>

<script>
  (function () {
    const $ = (id) => document.getElementById(id);

    function fmtYen(n) {
      const sign = n < 0 ? '-' : '';
      const abs = Math.abs(Math.round(n));
      return sign + abs.toLocaleString('ja-JP') + ' 円';
    }

    function roundTo(n, unit, dir) {
      if (unit <= 0) return Math.round(n);
      switch (dir) {
        case 'up': return Math.ceil(n / unit) * unit;
        case 'down': return Math.floor(n / unit) * unit;
        case 'round': return Math.round(n / unit) * unit;
      }
      return n;
    }

    function update() {
      const total = parseInt($('total').value, 10);
      const people = parseInt($('people').value, 10);
      const org = parseInt($('organizer').value, 10) || 0;
      const unit = parseInt($('round').value, 10);
      const dir = $('dir').value;

      if (!Number.isFinite(total) || total <= 0 || !Number.isFinite(people) || people < 1) {
        $('perPerson').textContent = '— 円';
        $('perOrganizer').textContent = '';
        $('detail').innerHTML = '';
        return;
      }
      // 幹事自身も人数に含まれる前提。残額（幹事が上乗せした残り）を全員で割る
      const remaining = total - org;
      if (remaining < 0) {
        $('perPerson').textContent = fmtYen(0);
        $('perOrganizer').textContent = '幹事の上乗せが合計を超えています';
        $('detail').innerHTML = '';
        return;
      }
      const rawPer = remaining / people;
      const per = roundTo(rawPer, unit, dir);
      const collected = per * people + org;
      const diff = collected - total;

      $('perPerson').textContent = fmtYen(per);
      const orgPays = per + org;
      if (org > 0) {
        $('perOrganizer').textContent = '幹事は ' + fmtYen(orgPays) + '（割り勘 ' + fmtYen(per) + ' + 上乗せ ' + fmtYen(org) + '）';
      } else {
        $('perOrganizer').textContent = '';
      }

      const items = [
        row('合計金額', fmtYen(total)),
        row('幹事の上乗せ', fmtYen(org)),
        row('参加者で割る対象', fmtYen(remaining)),
        row('1 人あたり (丸め前)', fmtYen(rawPer) + (rawPer === per ? '' : '  →  ' + fmtYen(per))),
        row('集まる金額 (合計)', fmtYen(collected)),
      ];
      if (diff !== 0) {
        const label = diff > 0 ? '余り' : '不足';
        const style = diff > 0 ? 'color:var(--added-fg);' : 'color:var(--removed-fg);';
        items.push(
          '<li><span class="label">' + label + '</span><span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;' + style + '">' + fmtYen(Math.abs(diff)) + '</span></li>'
        );
      }
      $('detail').innerHTML = items.join('');
    }
    function row(label, val) {
      return '<li><span class="label">' + label + '</span><span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;">' + val + '</span></li>';
    }

    ['total', 'people', 'organizer', 'round', 'dir'].forEach((id) => {
      $(id).addEventListener('input', update);
      $(id).addEventListener('change', update);
    });

    update();
  })();
</script>
</body>
</html>
