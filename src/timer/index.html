<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>タイマー / ストップウォッチ - public-tools</title>
<link rel="stylesheet" href="../_shared/style.css">
</head>
<body>
<div class="container">
  <div class="nav"><a href="../../index.html">← ツール一覧へ戻る</a></div>
  <header class="page-header">
    <h1>タイマー / ストップウォッチ</h1>
    <p class="lead">指定時間のカウントダウンと、ラップ計測付きのストップウォッチ。</p>
  </header>

  <div class="tabs" role="tablist">
    <button type="button" class="active" data-tab="timer">タイマー</button>
    <button type="button" data-tab="stopwatch">ストップウォッチ</button>
  </div>

  <!-- タイマー -->
  <section id="tab-timer">
    <div class="card" style="margin-bottom:16px;">
      <div style="display:flex;gap:12px;align-items:flex-end;">
        <div style="flex:1;">
          <div style="font-size:0.85rem;color:var(--muted);margin-bottom:4px;">時</div>
          <input type="number" id="t-h" min="0" max="99" value="0">
        </div>
        <div style="flex:1;">
          <div style="font-size:0.85rem;color:var(--muted);margin-bottom:4px;">分</div>
          <input type="number" id="t-m" min="0" max="59" value="3">
        </div>
        <div style="flex:1;">
          <div style="font-size:0.85rem;color:var(--muted);margin-bottom:4px;">秒</div>
          <input type="number" id="t-s" min="0" max="59" value="0">
        </div>
      </div>
      <div class="actions" style="margin-top:12px;">
        <button type="button" data-preset="60">1 分</button>
        <button type="button" data-preset="180">3 分</button>
        <button type="button" data-preset="300">5 分</button>
        <button type="button" data-preset="600">10 分</button>
        <button type="button" data-preset="1500">25 分 (Pomodoro)</button>
      </div>
    </div>

    <div class="display" id="t-display">00:03:00</div>

    <div class="actions" style="justify-content:center;margin-top:16px;">
      <button type="button" id="t-start" class="primary">スタート</button>
      <button type="button" id="t-pause" disabled>一時停止</button>
      <button type="button" id="t-reset">リセット</button>
    </div>
  </section>

  <!-- ストップウォッチ -->
  <section id="tab-stopwatch" style="display:none;">
    <div class="display" id="sw-display">00:00:00.000</div>

    <div class="actions" style="justify-content:center;margin-top:16px;">
      <button type="button" id="sw-start" class="primary">スタート</button>
      <button type="button" id="sw-lap" disabled>ラップ</button>
      <button type="button" id="sw-reset">リセット</button>
    </div>

    <ul class="plain-list" id="sw-laps" style="display:none;"></ul>
  </section>
</div>

<script>
  (function () {
    // ---- タブ切替 ----
    const tabs = document.querySelectorAll('.tabs button');
    tabs.forEach((btn) => {
      btn.addEventListener('click', function () {
        tabs.forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        const target = btn.dataset.tab;
        document.getElementById('tab-timer').style.display = target === 'timer' ? '' : 'none';
        document.getElementById('tab-stopwatch').style.display = target === 'stopwatch' ? '' : 'none';
      });
    });

    // ---- 共通: 時刻フォーマット ----
    function pad(n, w) {
      return String(n).padStart(w || 2, '0');
    }
    function formatHMS(totalSec) {
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      return pad(h) + ':' + pad(m) + ':' + pad(s);
    }
    function formatHMSms(ms) {
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      const milli = ms % 1000;
      return pad(h) + ':' + pad(m) + ':' + pad(s) + '.' + pad(milli, 3);
    }

    // ---- ビープ音 (Web Audio) ----
    let audioCtx = null;
    function beep(durationMs) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.value = 0.15;
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        setTimeout(() => {
          osc.stop();
        }, durationMs || 600);
      } catch (e) {
        // 失敗してもアラートで代替しない
      }
    }

    // ============ タイマー ============
    const tH = document.getElementById('t-h');
    const tM = document.getElementById('t-m');
    const tS = document.getElementById('t-s');
    const tDisplay = document.getElementById('t-display');
    const tStart = document.getElementById('t-start');
    const tPause = document.getElementById('t-pause');
    const tReset = document.getElementById('t-reset');

    let timerState = 'idle'; // 'idle' | 'running' | 'paused'
    let timerEndAt = 0;
    let timerRemaining = 0; // ms (paused 時)
    let timerTickHandle = null;

    function readTimerInputs() {
      const h = Math.max(0, parseInt(tH.value, 10) || 0);
      const m = Math.max(0, parseInt(tM.value, 10) || 0);
      const s = Math.max(0, parseInt(tS.value, 10) || 0);
      return (h * 3600 + m * 60 + s) * 1000;
    }

    function renderTimer(ms) {
      const sec = Math.max(0, Math.ceil(ms / 1000));
      tDisplay.textContent = formatHMS(sec);
    }

    function timerTick() {
      if (timerState !== 'running') return;
      const remain = timerEndAt - Date.now();
      if (remain <= 0) {
        renderTimer(0);
        timerStop();
        beep(800);
        return;
      }
      renderTimer(remain);
      timerTickHandle = setTimeout(timerTick, Math.min(250, remain));
    }

    function timerStart() {
      let durationMs;
      if (timerState === 'paused') {
        durationMs = timerRemaining;
      } else {
        durationMs = readTimerInputs();
        if (durationMs <= 0) return;
      }
      timerEndAt = Date.now() + durationMs;
      timerState = 'running';
      tStart.disabled = true;
      tPause.disabled = false;
      [tH, tM, tS].forEach((el) => (el.disabled = true));
      timerTick();
    }

    function timerPause() {
      if (timerState !== 'running') return;
      timerRemaining = timerEndAt - Date.now();
      timerState = 'paused';
      clearTimeout(timerTickHandle);
      tStart.disabled = false;
      tStart.textContent = '再開';
      tPause.disabled = true;
    }

    function timerStop() {
      timerState = 'idle';
      clearTimeout(timerTickHandle);
      tStart.disabled = false;
      tStart.textContent = 'スタート';
      tPause.disabled = true;
      [tH, tM, tS].forEach((el) => (el.disabled = false));
    }

    function timerReset() {
      timerStop();
      renderTimer(readTimerInputs());
    }

    tStart.addEventListener('click', timerStart);
    tPause.addEventListener('click', timerPause);
    tReset.addEventListener('click', timerReset);

    [tH, tM, tS].forEach((el) => {
      el.addEventListener('input', function () {
        if (timerState === 'idle') renderTimer(readTimerInputs());
      });
    });

    document.querySelectorAll('[data-preset]').forEach((btn) => {
      btn.addEventListener('click', function () {
        if (timerState !== 'idle') return;
        const sec = parseInt(btn.dataset.preset, 10);
        tH.value = Math.floor(sec / 3600);
        tM.value = Math.floor((sec % 3600) / 60);
        tS.value = sec % 60;
        renderTimer(readTimerInputs());
      });
    });

    renderTimer(readTimerInputs());

    // ============ ストップウォッチ ============
    const swDisplay = document.getElementById('sw-display');
    const swStart = document.getElementById('sw-start');
    const swLap = document.getElementById('sw-lap');
    const swReset = document.getElementById('sw-reset');
    const swLaps = document.getElementById('sw-laps');

    let swState = 'idle';
    let swStartedAt = 0;
    let swElapsedBefore = 0;
    let swTickHandle = null;
    const lapList = [];

    function swCurrent() {
      if (swState === 'running') {
        return swElapsedBefore + (Date.now() - swStartedAt);
      }
      return swElapsedBefore;
    }

    function renderSw() {
      swDisplay.textContent = formatHMSms(swCurrent());
    }

    function swTick() {
      if (swState !== 'running') return;
      renderSw();
      swTickHandle = setTimeout(swTick, 31);
    }

    swStart.addEventListener('click', function () {
      if (swState === 'running') {
        swElapsedBefore = swCurrent();
        swState = 'paused';
        swStart.textContent = '再開';
        swStart.classList.remove('primary');
        swLap.disabled = true;
        clearTimeout(swTickHandle);
      } else {
        swStartedAt = Date.now();
        swState = 'running';
        swStart.textContent = '一時停止';
        swStart.classList.add('primary');
        swLap.disabled = false;
        swTick();
      }
    });

    swLap.addEventListener('click', function () {
      if (swState !== 'running') return;
      const cur = swCurrent();
      const prev = lapList.length > 0 ? lapList[lapList.length - 1].total : 0;
      const split = cur - prev;
      lapList.push({ total: cur, split: split });
      const li = document.createElement('li');
      li.innerHTML =
        '<span class="label">Lap ' + lapList.length + '</span>' +
        '<span>' + formatHMSms(split) + ' <span class="label">(' + formatHMSms(cur) + ')</span></span>';
      swLaps.prepend(li);
      swLaps.style.display = '';
    });

    swReset.addEventListener('click', function () {
      swState = 'idle';
      clearTimeout(swTickHandle);
      swElapsedBefore = 0;
      swStartedAt = 0;
      lapList.length = 0;
      swStart.textContent = 'スタート';
      swStart.classList.add('primary');
      swLap.disabled = true;
      swLaps.innerHTML = '';
      swLaps.style.display = 'none';
      renderSw();
    });

    renderSw();
  })();
</script>
</body>
</html>
