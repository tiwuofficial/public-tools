<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>電卓 - public-tools</title>
<link rel="stylesheet" href="../_shared/style.css">
<style>
  /* tool-local: 電卓レイアウト */
  .calc-wrap {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 24px;
    align-items: start;
  }
  .calc {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .calc-display {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 12px;
    text-align: right;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-variant-numeric: tabular-nums;
  }
  .calc-display .expr {
    color: var(--muted);
    font-size: 0.9rem;
    min-height: 1.3em;
    overflow: auto;
    white-space: nowrap;
  }
  .calc-display .now {
    font-size: 2rem;
    font-weight: 600;
    overflow: auto;
    white-space: nowrap;
  }
  .calc-display .mem-flag {
    font-size: 0.75rem;
    color: var(--accent);
    text-align: left;
    margin-bottom: -4px;
    visibility: hidden;
  }
  .calc-display .mem-flag.on { visibility: visible; }
  .keys {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .keys button {
    padding: 16px 0;
    font-size: 1.15rem;
    font-weight: 600;
    border-radius: var(--radius);
  }
  .keys .op { color: var(--accent); }
  .keys .eq {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .keys .eq:hover { color: #fff; filter: brightness(1.05); }
  .keys .ac { color: var(--danger); }
  .keys .span2 { grid-column: span 2; }
  .tax-row { display: flex; gap: 8px; margin-top: 8px; }
  .tax-row select {
    width: auto;
    flex: 0 0 auto;
  }
  .tax-row button { flex: 1; padding: 12px 0; font-weight: 600; }

  .history {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    max-height: 480px;
    overflow-y: auto;
  }
  .history h2 { margin-top: 0; }
  .history-item {
    padding: 8px 6px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.9rem;
  }
  .history-item:last-child { border-bottom: none; }
  .history-item:hover { background: var(--bg); }
  .history-item .h-expr { color: var(--muted); font-size: 0.8rem; }
  .history-item .h-result { font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="../../index.html">← ツール一覧へ戻る</a></div>
  <header class="page-header">
    <h1>電卓</h1>
    <p class="lead">四則演算・%・メモリ機能・税込/税抜計算・履歴つきの電卓。キーボード入力にも対応。</p>
  </header>

  <div class="calc-wrap">
    <div class="calc">
      <div class="calc-display">
        <div class="mem-flag" id="memFlag">M</div>
        <div class="expr" id="expr">&nbsp;</div>
        <div class="now" id="now">0</div>
      </div>

      <div class="keys">
        <button type="button" class="ac" data-key="AC">AC</button>
        <button type="button" data-key="CE">CE</button>
        <button type="button" data-key="±">±</button>
        <button type="button" class="op" data-key="÷">÷</button>

        <button type="button" data-key="7">7</button>
        <button type="button" data-key="8">8</button>
        <button type="button" data-key="9">9</button>
        <button type="button" class="op" data-key="×">×</button>

        <button type="button" data-key="4">4</button>
        <button type="button" data-key="5">5</button>
        <button type="button" data-key="6">6</button>
        <button type="button" class="op" data-key="−">−</button>

        <button type="button" data-key="1">1</button>
        <button type="button" data-key="2">2</button>
        <button type="button" data-key="3">3</button>
        <button type="button" class="op" data-key="+">+</button>

        <button type="button" data-key="%">%</button>
        <button type="button" data-key="0">0</button>
        <button type="button" data-key=".">.</button>
        <button type="button" class="eq" data-key="=">=</button>

        <button type="button" data-key="MC">MC</button>
        <button type="button" data-key="MR">MR</button>
        <button type="button" data-key="M+">M+</button>
        <button type="button" data-key="M-">M−</button>
      </div>

      <div class="tax-row">
        <select id="taxRate" title="税率">
          <option value="0.08">8%</option>
          <option value="0.10" selected>10%</option>
          <option value="0.05">5%</option>
        </select>
        <button type="button" id="taxIn">税込</button>
        <button type="button" id="taxOut">税抜</button>
      </div>
    </div>

    <div class="history">
      <h2 style="margin:0 0 8px;display:flex;justify-content:space-between;align-items:center;">
        履歴
        <button type="button" id="clearHist" style="font-size:0.8rem;padding:4px 10px;">消去</button>
      </h2>
      <div id="histList" style="color:var(--muted);font-size:0.9rem;">まだ計算がありません。</div>
    </div>
  </div>

  <p style="color:var(--muted);font-size:0.85rem;margin-top:24px;">
    キーボード: 数字 / <code>+ - * /</code> / <code>Enter</code> または <code>=</code> で計算 / <code>Backspace</code> で 1 文字削除 / <code>Esc</code> で AC。
  </p>
</div>

<script>
  (function () {
    const $ = (id) => document.getElementById(id);

    let current = '0';     // ディスプレイの数字 (文字列)
    let stored = null;     // 直前の値 (Number)
    let pendingOp = null;  // 直前の演算子 ('+', '-', '*', '/')
    let exprStr = '';      // 表示用の式文字列
    let justEvaluated = false;
    let memory = 0;
    let history = [];

    function fmt(n) {
      if (!Number.isFinite(n)) return 'Error';
      // 大きすぎる/小さすぎる場合は指数
      if (Math.abs(n) >= 1e15 || (n !== 0 && Math.abs(n) < 1e-9)) {
        return n.toExponential(8).replace(/0+e/, 'e').replace(/\.e/, 'e');
      }
      // 小数点以下を必要なら最大 10 桁で丸める
      const rounded = Math.round((n + Number.EPSILON) * 1e10) / 1e10;
      const s = rounded.toString();
      return groupThousands(s);
    }
    function groupThousands(s) {
      const neg = s.startsWith('-');
      if (neg) s = s.slice(1);
      const [intPart, frac] = s.split('.');
      const grouped = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return (neg ? '-' : '') + grouped + (frac !== undefined ? '.' + frac : '');
    }

    function render() {
      $('now').textContent = current;
      $('expr').innerHTML = exprStr || '&nbsp;';
      $('memFlag').classList.toggle('on', memory !== 0);
    }

    function inputDigit(d) {
      if (justEvaluated) {
        current = d;
        exprStr = '';
        justEvaluated = false;
      } else if (current === '0') {
        current = d;
      } else {
        // 12 桁制限 (整数部 12 桁)
        const digitsOnly = current.replace(/[,.\-]/g, '');
        if (digitsOnly.length >= 14) return;
        current += d;
      }
      // 桁区切りを再適用
      current = groupThousands(current.replace(/,/g, ''));
      render();
    }
    function inputDot() {
      if (justEvaluated) { current = '0'; justEvaluated = false; exprStr = ''; }
      if (!current.includes('.')) current += '.';
      render();
    }
    function toggleSign() {
      if (current === '0') return;
      current = current.startsWith('-') ? current.slice(1) : '-' + current;
      render();
    }
    function clearEntry() {
      current = '0';
      render();
    }
    function allClear() {
      current = '0'; stored = null; pendingOp = null; exprStr = ''; justEvaluated = false;
      render();
    }
    function backspace() {
      if (justEvaluated) { allClear(); return; }
      let s = current.replace(/,/g, '');
      if (s.length <= 1 || (s.length === 2 && s.startsWith('-'))) s = '0';
      else s = s.slice(0, -1);
      current = groupThousands(s);
      render();
    }
    function num() {
      return parseFloat(current.replace(/,/g, ''));
    }

    function operate(a, b, op) {
      switch (op) {
        case '+': return a + b;
        case '-': return a - b;
        case '*': return a * b;
        case '/': return a / b;
      }
      return b;
    }
    function opSymbol(op) {
      return ({ '+': '+', '-': '−', '*': '×', '/': '÷' })[op] || op;
    }

    function applyOp(nextOp) {
      const cur = num();
      if (stored === null) {
        stored = cur;
        exprStr = fmt(cur) + ' ' + opSymbol(nextOp);
      } else if (justEvaluated) {
        stored = cur;
        exprStr = fmt(cur) + ' ' + opSymbol(nextOp);
      } else {
        const r = operate(stored, cur, pendingOp);
        stored = r;
        exprStr = fmt(r) + ' ' + opSymbol(nextOp);
        current = fmt(r);
      }
      pendingOp = nextOp;
      justEvaluated = false;
      // 次の入力で current を上書きするフラグを立てる代わりに、ここでマーク
      window._calcReplace = true;
      render();
    }

    function equals() {
      if (pendingOp === null || stored === null) return;
      const cur = num();
      const r = operate(stored, cur, pendingOp);
      const exprFull = fmt(stored) + ' ' + opSymbol(pendingOp) + ' ' + fmt(cur);
      pushHistory(exprFull, fmt(r));
      exprStr = exprFull + ' =';
      current = fmt(r);
      stored = null;
      pendingOp = null;
      justEvaluated = true;
      render();
    }

    function percent() {
      // 直前に演算子があれば「stored の n%」、なければそのまま /100
      if (stored !== null && pendingOp !== null) {
        const p = num();
        let r;
        if (pendingOp === '+' || pendingOp === '-') r = stored * p / 100;
        else r = p / 100;
        current = fmt(r);
      } else {
        current = fmt(num() / 100);
      }
      render();
    }

    function tax(kind) {
      const rate = parseFloat($('taxRate').value);
      const v = num();
      let r;
      if (kind === 'in') r = v * (1 + rate); // 税込
      else r = v / (1 + rate);              // 税抜
      const exprFull = fmt(v) + (kind === 'in' ? ' (税込)' : ' (税抜)');
      pushHistory(exprFull, fmt(r));
      exprStr = exprFull + ' =';
      current = fmt(r);
      stored = null;
      pendingOp = null;
      justEvaluated = true;
      render();
    }

    // メモリ
    function memClear() { memory = 0; render(); }
    function memRecall() { current = fmt(memory); justEvaluated = true; render(); }
    function memAdd() { memory += num(); render(); }
    function memSub() { memory -= num(); render(); }

    // 履歴
    function pushHistory(expr, result) {
      history.unshift({ expr, result });
      if (history.length > 50) history.pop();
      renderHistory();
    }
    function renderHistory() {
      if (history.length === 0) {
        $('histList').innerHTML = '<div style="color:var(--muted);font-size:0.9rem;">まだ計算がありません。</div>';
        return;
      }
      $('histList').innerHTML = history.map((h, i) =>
        '<div class="history-item" data-i="' + i + '">' +
          '<div class="h-expr">' + escapeHtml(h.expr) + '</div>' +
          '<div class="h-result">= ' + escapeHtml(h.result) + '</div>' +
        '</div>'
      ).join('');
    }
    function escapeHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    document.addEventListener('click', function (e) {
      const item = e.target.closest('.history-item');
      if (item) {
        const idx = parseInt(item.dataset.i, 10);
        const h = history[idx];
        if (h) {
          current = h.result;
          exprStr = h.expr + ' =';
          justEvaluated = true;
          render();
        }
      }
    });

    // ボタン
    document.querySelectorAll('.keys button').forEach((b) => {
      b.addEventListener('click', () => handleKey(b.dataset.key));
    });
    function handleKey(k) {
      // 演算子直後の入力で current を上書き
      if (window._calcReplace && /^[\d.]$/.test(k)) {
        current = '0';
        window._calcReplace = false;
      }
      if (/^\d$/.test(k)) inputDigit(k);
      else if (k === '.') inputDot();
      else if (k === '±') toggleSign();
      else if (k === 'AC') allClear();
      else if (k === 'CE') clearEntry();
      else if (k === '%') percent();
      else if (k === '+') applyOp('+');
      else if (k === '−') applyOp('-');
      else if (k === '×') applyOp('*');
      else if (k === '÷') applyOp('/');
      else if (k === '=') equals();
      else if (k === 'MC') memClear();
      else if (k === 'MR') memRecall();
      else if (k === 'M+') memAdd();
      else if (k === 'M-') memSub();
    }
    $('taxIn').addEventListener('click', () => tax('in'));
    $('taxOut').addEventListener('click', () => tax('out'));
    $('clearHist').addEventListener('click', function () { history = []; renderHistory(); });

    // キーボード
    document.addEventListener('keydown', function (e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const k = e.key;
      if (/^\d$/.test(k)) handleKey(k);
      else if (k === '.') handleKey('.');
      else if (k === '+') handleKey('+');
      else if (k === '-') handleKey('−');
      else if (k === '*') handleKey('×');
      else if (k === '/') { e.preventDefault(); handleKey('÷'); }
      else if (k === '%') handleKey('%');
      else if (k === 'Enter' || k === '=') { e.preventDefault(); handleKey('='); }
      else if (k === 'Backspace') { e.preventDefault(); backspace(); }
      else if (k === 'Escape') handleKey('AC');
    });

    render();
  })();
</script>
</body>
</html>
