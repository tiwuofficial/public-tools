<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>еєійљҐи®ИзЃЧ - public-tools</title>
<link rel="stylesheet" href="../_shared/style.css">
<style>
  /* tool-local: е§ІгБНгБДеєійљҐи°®з§Ї */
  .age-big {
    text-align: center;
    margin: 8px 0;
  }
  .age-big .num {
    font-size: 3rem;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .age-big .unit { font-size: 1.2rem; color: var(--muted); margin-left: 6px; }
</style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="../../index.html">вЖР гГДгГЉгГЂдЄАи¶ІгБЄжИїгВЛ</a></div>
  <header class="page-header">
    <h1>еєійљҐи®ИзЃЧ</h1>
    <p class="lead">зФЯеєіжЬИжЧ•гБЛгВЙжЇАеєійљҐгГїзФЯгБЊгВМгБ¶гБЛгВЙгБЃжЧ•жХ∞гГїеє≤жФѓгГїжШЯеЇІгГїжђ°гБЃи™ХзФЯжЧ•гБЊгБІгВТи®ИзЃЧгБЧгБЊгБЩгАВ</p>
  </header>

  <div class="card">
    <div style="display:grid;grid-template-columns:140px 1fr;gap:10px;align-items:center;">
      <label for="birth" style="color:var(--muted);font-size:0.95rem;">зФЯеєіжЬИжЧ•</label>
      <input type="date" id="birth">

      <label for="ref" style="color:var(--muted);font-size:0.95rem;">еЯЇжЇЦжЧ•</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="date" id="ref" style="flex:1;">
        <button type="button" id="today">дїКжЧ•</button>
      </div>
    </div>
  </div>

  <h2>жЇАеєійљҐ</h2>
  <div class="card">
    <div class="age-big"><span class="num" id="years">-</span><span class="unit">ж≠≥</span></div>
    <div style="text-align:center;color:var(--muted);" id="ymd">-</div>
  </div>

  <h2>и©≥зі∞</h2>
  <ul class="plain-list" id="detail"></ul>
</div>

<script>
  (function () {
    const $ = (id) => document.getElementById(id);

    function escapeHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function pad(n, w) { return String(n).padStart(w || 2, '0'); }
    function todayStr() {
      const d = new Date();
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    }

    const ZODIAC = ['е≠Р', 'дЄС', 'еѓЕ', 'еНѓ', 'иЊ∞', 'еЈ≥', 'еНИ', 'жЬ™', 'зФ≥', 'йЕЙ', 'жИМ', 'дЇ•'];
    const ZODIAC_EN = ['гБ≠гБЪгБњ', 'зЙЫ', 'гБ®гВЙ', 'гБЖгБХгБО', 'зЂЬ', 'гБЄгБ≥', 'й¶ђ', 'гБ≤гБ§гБШ', 'гБХгВЛ', 'гБ®гВК', 'гБДгБђ', 'гБДгБЃгБЧгБЧ'];
    const ERAS = [
      // start: { y, m, d, name }
      { y: 2019, m: 5, d: 1, name: 'дї§еТМ' },
      { y: 1989, m: 1, d: 8, name: 'еє≥жИР' },
      { y: 1926, m: 12, d: 25, name: 'жШ≠еТМ' },
      { y: 1912, m: 7, d: 30, name: 'е§Іж≠£' },
      { y: 1868, m: 1, d: 25, name: 'жШОж≤ї' },
    ];

    function eraName(y, m, d) {
      for (const e of ERAS) {
        if (y > e.y || (y === e.y && (m > e.m || (m === e.m && d >= e.d)))) {
          const yy = y - e.y + 1;
          return e.name + (yy === 1 ? 'еЕГ' : yy) + 'еєі';
        }
      }
      return 'жШОж≤їдї•еЙН';
    }

    // и•њжіЛеН†жШЯи°УпЉИе§™йЩљжШЯеЇІпЉЙ
    function horoscope(m, d) {
      const list = [
        ['е±±зЊКеЇІ', 1, 19], ['ж∞ізУґеЇІ', 2, 18], ['й≠ЪеЇІ', 3, 20],
        ['зЙ°зЊКеЇІ', 4, 19], ['зЙ°зЙЫеЇІ', 5, 20], ['еПМе≠РеЇІ', 6, 21],
        ['иЯєеЇІ', 7, 22], ['зНЕе≠РеЇІ', 8, 22], ['дєЩе•≥еЇІ', 9, 22],
        ['е§©зІ§еЇІ', 10, 23], ['и†НеЇІ', 11, 22], ['е∞ДжЙЛеЇІ', 12, 21],
        ['е±±зЊКеЇІ', 12, 31],
      ];
      for (const [name, mo, day] of list) {
        if (m < mo || (m === mo && d <= day)) return name;
      }
      return 'е±±зЊКеЇІ';
    }

    function diffYMD(from, to) {
      // from <= to гБЃеЙНжПР
      let y = to.getFullYear() - from.getFullYear();
      let mo = to.getMonth() - from.getMonth();
      let d = to.getDate() - from.getDate();
      if (d < 0) {
        const prevMonth = new Date(to.getFullYear(), to.getMonth(), 0);
        d += prevMonth.getDate();
        mo -= 1;
      }
      if (mo < 0) { mo += 12; y -= 1; }
      return { y, mo, d };
    }

    function nextBirthday(birth, ref) {
      let cand = new Date(ref.getFullYear(), birth.getMonth(), birth.getDate());
      if (cand < ref) cand = new Date(ref.getFullYear() + 1, birth.getMonth(), birth.getDate());
      return cand;
    }

    function update() {
      const bv = $('birth').value;
      const rv = $('ref').value;
      if (!bv || !rv) {
        $('years').textContent = '-'; $('ymd').textContent = '-'; $('detail').innerHTML = ''; return;
      }
      const [by, bm, bd] = bv.split('-').map((s) => parseInt(s, 10));
      const [ry, rm, rd] = rv.split('-').map((s) => parseInt(s, 10));
      const birth = new Date(by, bm - 1, bd);
      const ref = new Date(ry, rm - 1, rd);
      if (birth > ref) {
        $('years').textContent = 'вАФ';
        $('ymd').textContent = 'еЯЇжЇЦжЧ•гБМзФЯеєіжЬИжЧ•гВИгВКеЙНгБІгБЩ';
        $('detail').innerHTML = '';
        return;
      }
      const { y, mo, d } = diffYMD(birth, ref);
      const ms = ref.getTime() - birth.getTime();
      const days = Math.floor(ms / 86400000);
      const weeks = Math.floor(days / 7);
      const hours = Math.floor(ms / 3600000);
      const minutes = Math.floor(ms / 60000);

      const next = nextBirthday(birth, ref);
      const daysToBday = Math.ceil((next - ref) / 86400000);
      const ageOnNext = next.getFullYear() - by;

      $('years').textContent = y;
      $('ymd').textContent = y + ' ж≠≥ ' + mo + ' гГґжЬИ ' + d + ' жЧ•';

      const items = [
        row('зФЯеєіжЬИжЧ•', bv + ' (' + eraName(by, bm, bd) + ')'),
        row('еЯЇжЇЦжЧ•', rv),
        row('зФЯгБЊгВМгБ¶гБЛгВЙ', days.toLocaleString('ja-JP') + ' жЧ• / ' + weeks.toLocaleString('ja-JP') + ' йА±'),
        row('жЩВйЦУ / еИЖ', hours.toLocaleString('ja-JP') + ' жЩВйЦУ / ' + minutes.toLocaleString('ja-JP') + ' еИЖ'),
        row('еє≤жФѓ', ZODIAC[(by - 4) % 12] + 'пЉИ' + ZODIAC_EN[(by - 4) % 12] + 'еєіпЉЙ'),
        row('жШЯеЇІ', horoscope(bm, bd)),
        row('жђ°гБЃи™ХзФЯжЧ•гБЊгБІ', daysToBday + ' жЧ•пЉИ' + (next.getFullYear() + '-' + pad(next.getMonth() + 1) + '-' + pad(next.getDate())) + 'гАБ' + ageOnNext + ' ж≠≥пЉЙ'),
      ];
      $('detail').innerHTML = items.join('');
    }
    function row(label, val) {
      return '<li><span class="label">' + escapeHtml(label) + '</span><span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;">' + escapeHtml(val) + '</span></li>';
    }

    $('today').addEventListener('click', function () { $('ref').value = todayStr(); update(); });
    ['birth', 'ref'].forEach((id) => {
      $(id).addEventListener('input', update);
      $(id).addEventListener('change', update);
    });

    $('ref').value = todayStr();
    $('birth').value = '2000-01-01';
    update();
  })();
</script>
</body>
</html>
