<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>public-tools</title>
<style>
  :root {
    --bg: #f7f8fa;
    --fg: #1f2328;
    --muted: #6b7280;
    --accent: #2563eb;
    --card: #ffffff;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
      "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.6;
  }
  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 16px 64px;
  }
  header { margin-bottom: 24px; }
  h1 { font-size: 1.8rem; margin: 0 0 4px; }
  .lead { color: var(--muted); margin: 0; }
  h2 { font-size: 1.2rem; margin: 24px 0 12px; }
  ul.tools {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }
  ul.tools li {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  ul.tools a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  ul.tools a:hover { text-decoration: underline; }
  ul.tools .desc {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 4px;
  }
  footer {
    margin-top: 48px;
    color: var(--muted);
    font-size: 0.85rem;
  }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>public-tools</h1>
    <p class="lead">ブラウザだけで動く便利な web ツール集。</p>
  </header>

  <h2>ツール一覧</h2>
  <ul class="tools">
    <li>
      <a href="src/character-counter/index.html">文字数カウンタ</a>
      <div class="desc">文字数・単語数・行数・バイト数をリアルタイム計測。</div>
    </li>
  </ul>

  <footer>
    <p>Source: <a href="https://github.com/tiwuofficial/public-tools">github.com/tiwuofficial/public-tools</a></p>
  </footer>
</div>
</body>
</html>
